<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>Cyber City 2084</title>
  <style>
    *{margin:0;padding:0}
    body{background:#000;overflow:hidden}
    canvas{display:block}
    #ui{position:fixed;top:20px;left:0;right:0;text-align:center;z-index:10;pointer-events:none}
    #ui h1{font:900 clamp(22px,4vw,50px) 'Segoe UI',sans-serif;letter-spacing:6px;
      background:linear-gradient(90deg,#0ff,#f0f,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    #ctrl{position:fixed;bottom:20px;left:0;right:0;text-align:center;color:rgba(255,255,255,.3);font:12px sans-serif;letter-spacing:3px;z-index:10;pointer-events:none}
    #hud{position:fixed;bottom:50px;right:25px;z-index:10;pointer-events:none;color:#0ff;font:bold 14px monospace}
    #fps{position:fixed;top:10px;right:10px;z-index:10;pointer-events:none;color:#0f0;font:bold 12px monospace}
  </style>
</head>
<body>
<div id="ui"><h1>CYBER CITY 2084</h1></div>
<div id="ctrl">W A S D — Drive &nbsp;|&nbsp; Drag — Camera</div>
<div id="hud">0 KM/H</div>
<div id="fps"></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.162.0/build/three.min.js"></script>
<script>
'use strict';

// ---- RENDERER ----
const renderer = new THREE.WebGLRenderer({
  antialias: false,
  powerPreference: 'high-performance',
  stencil: false,
  alpha: false
});
renderer.setPixelRatio(1);
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x050010);
renderer.sortObjects = false;
renderer.info.autoReset = false;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 1, 180);
cam.position.set(0, 8, 16);

// Reusable objects — ZERO allocations in render loop
const dummy = new THREE.Object3D();
const _v = new THREE.Vector3();
const _cv = new THREE.Vector3();
const _ct = new THREE.Vector3();
const _col = new THREE.Color();

// ---- STATIC SCENE (built once, never touched again) ----

// Ground
{
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(120, 120),
    new THREE.MeshBasicMaterial({color: 0x0a0a18})
  );
  m.rotation.x = -Math.PI/2;
  scene.add(m);
}

// Road + edge lines — 3 planes (cheap)
{
  const mat = new THREE.MeshBasicMaterial({color: 0x111125});
  const road = new THREE.Mesh(new THREE.PlaneGeometry(6, 120), mat);
  road.rotation.x = -Math.PI/2; road.position.y = 0.01;
  scene.add(road);
  const edgeMat = new THREE.MeshBasicMaterial({color: 0x00f5ff});
  [-3.2, 3.2].forEach(x => {
    const e = new THREE.Mesh(new THREE.PlaneGeometry(0.08, 120), edgeMat);
    e.rotation.x = -Math.PI/2; e.position.set(x, 0.02, 0);
    scene.add(e);
  });
}

// Road marks — 1 InstancedMesh
{
  const g = new THREE.PlaneGeometry(0.2, 2.5);
  const m = new THREE.MeshBasicMaterial({color: 0xffdd00});
  const inst = new THREE.InstancedMesh(g, m, 16);
  for (let i = 0; i < 16; i++) {
    dummy.position.set(0, 0.03, -45 + i * 6);
    dummy.rotation.set(-Math.PI/2, 0, 0);
    dummy.scale.setScalar(1);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
  }
  inst.instanceMatrix.needsUpdate = true;
  scene.add(inst);
}

// Buildings — 1 InstancedMesh with per-instance color
const bdata = [
  [-8,-6,3,9,3],  [8,-6,3,11,3],
  [-12,-12,2.5,13,2.5], [12,-12,2.5,8,2.5],
  [-8,-18,3,7,3], [8,-18,3,15,3],
  [-12,-24,2,10,2], [12,-24,2,12,2],
  [-8,6,3,8,3],   [8,6,3,10,3],
  [-12,12,2.5,12,2.5], [12,12,2.5,7,2.5],
  [-8,18,3,6,3],  [8,18,3,9,3],
  [-12,24,2,11,2], [12,24,2,8,2],
];
{
  const geo = new THREE.BoxGeometry(1, 1, 1);
  const mat = new THREE.MeshBasicMaterial();
  const inst = new THREE.InstancedMesh(geo, mat, bdata.length);
  const colors = [0xff00ff, 0x00f5ff, 0x00ff88, 0xffff00, 0xff6600, 0x8800ff];
  bdata.forEach((b, i) => {
    dummy.position.set(b[0], b[3]/2, b[1]);
    dummy.scale.set(b[2], b[3], b[4]);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
    inst.setColorAt(i, _col.setHex(colors[i % colors.length]));
  });
  inst.instanceMatrix.needsUpdate = true;
  inst.instanceColor.needsUpdate = true;
  scene.add(inst);
}

// Windows — 1 InstancedMesh
{
  const wp = [];
  bdata.forEach(b => {
    for (let y = 0; y < Math.floor(b[3]/2); y++) {
      for (let x = -1; x <= 1; x++) {
        if (Math.random() > .5) wp.push(b[0]+x*.7, y*1.3+1.5, b[1]+b[4]/2+.01);
      }
    }
  });
  const n = wp.length / 3;
  const geo = new THREE.PlaneGeometry(.4, .4);
  const mat = new THREE.MeshBasicMaterial({color: 0xffff88});
  const inst = new THREE.InstancedMesh(geo, mat, n);
  for (let i = 0; i < n; i++) {
    dummy.position.set(wp[i*3], wp[i*3+1], wp[i*3+2]);
    dummy.scale.setScalar(1);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
  }
  inst.instanceMatrix.needsUpdate = true;
  scene.add(inst);
}

// Lamps — 1 InstancedMesh
{
  const positions = [];
  for (let z = -40; z < 40; z += 12) { positions.push([-5.5, z], [5.5, z]); }
  const geo = new THREE.SphereGeometry(.2, 4, 4);
  const mat = new THREE.MeshBasicMaterial({color: 0xffffaa});
  const inst = new THREE.InstancedMesh(geo, mat, positions.length);
  positions.forEach(([x, z], i) => {
    dummy.position.set(x, 4.5, z);
    dummy.scale.setScalar(1);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
  });
  inst.instanceMatrix.needsUpdate = true;
  scene.add(inst);
}

// Arches — 1 InstancedMesh (12 cylinders)
{
  const geo = new THREE.CylinderGeometry(.06, .06, 1, 4);
  const mat = new THREE.MeshBasicMaterial();
  const archZ = [-15, -25, -35, -45];
  const archColors = [0x00f5ff, 0xff00ff, 0xffff00, 0x00ff88];
  const inst = new THREE.InstancedMesh(geo, mat, archZ.length * 3);
  let idx = 0;
  archZ.forEach((z, ai) => {
    // Top bar
    dummy.position.set(0, 5, z);
    dummy.rotation.set(0, 0, Math.PI/2);
    dummy.scale.set(1, 7, 1);
    dummy.updateMatrix();
    inst.setMatrixAt(idx, dummy.matrix);
    inst.setColorAt(idx, _col.setHex(archColors[ai]));
    idx++;
    // Posts
    [-3.5, 3.5].forEach(x => {
      dummy.position.set(x, 2.5, z);
      dummy.rotation.set(0, 0, 0);
      dummy.scale.set(1, 5, 1);
      dummy.updateMatrix();
      inst.setMatrixAt(idx, dummy.matrix);
      inst.setColorAt(idx, _col.setHex(archColors[ai]));
      idx++;
    });
  });
  inst.instanceMatrix.needsUpdate = true;
  inst.instanceColor.needsUpdate = true;
  scene.add(inst);
}

// Rings — 4 (animated)
const rings = [];
[{z:-10,c:0x00f5ff},{z:-30,c:0xff00ff},{z:-50,c:0xffff00},{z:-70,c:0x00ff88}].forEach(({z, c}, i) => {
  const r = new THREE.Mesh(
    new THREE.TorusGeometry(4, .06, 4, 24),
    new THREE.MeshBasicMaterial({color: c})
  );
  r.position.set(0, 5, z);
  r.rotation.x = Math.PI/2;
  scene.add(r);
  rings.push({m: r, y: 5, p: i * 1.5});
});

// Sky dome
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(90, 8, 4),
  new THREE.MeshBasicMaterial({color: 0x030012, side: THREE.BackSide})
));

// Stars — 1 Points
{
  const p = new Float32Array(100 * 3);
  for (let i = 0; i < 100; i++) {
    p[i*3] = (Math.random()-.5) * 180;
    p[i*3+1] = Math.random() * 50 + 10;
    p[i*3+2] = (Math.random()-.5) * 180;
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(p, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({color: 0xffffff, size: .12})));
}

// Moon
{
  const m = new THREE.Mesh(new THREE.SphereGeometry(3, 6, 6), new THREE.MeshBasicMaterial({color: 0xddeeff}));
  m.position.set(-35, 45, -70);
  scene.add(m);
}

// ---- CAR ----
const car = new THREE.Group();
{
  // Body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.8, .6, 3.6),
    new THREE.MeshBasicMaterial({color: 0x00ccff})
  );
  body.position.y = .5;
  car.add(body);

  // Cabin
  const cabin = new THREE.Mesh(
    new THREE.BoxGeometry(1.4, .5, 2),
    new THREE.MeshBasicMaterial({color: 0x003344})
  );
  cabin.position.set(0, 1.05, -.15);
  car.add(cabin);

  // Headlights — 1 instanced
  const hlGeo = new THREE.BoxGeometry(.25, .12, .04);
  const hlMat = new THREE.MeshBasicMaterial({color: 0xffffcc});
  const hlInst = new THREE.InstancedMesh(hlGeo, hlMat, 2);
  [-.5, .5].forEach((x, i) => {
    dummy.position.set(x, .5, 1.81);
    dummy.scale.setScalar(1);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    hlInst.setMatrixAt(i, dummy.matrix);
  });
  hlInst.instanceMatrix.needsUpdate = true;
  car.add(hlInst);

  // Taillights — 1 instanced
  const tlGeo = new THREE.BoxGeometry(.22, .1, .04);
  const tlMat = new THREE.MeshBasicMaterial({color: 0xff2200});
  const tlInst = new THREE.InstancedMesh(tlGeo, tlMat, 2);
  [-.6, .6].forEach((x, i) => {
    dummy.position.set(x, .5, -1.82);
    dummy.scale.setScalar(1);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    tlInst.setMatrixAt(i, dummy.matrix);
  });
  tlInst.instanceMatrix.needsUpdate = true;
  car.add(tlInst);

  // Wheels — 1 instanced
  const wGeo = new THREE.CylinderGeometry(.3, .3, .25, 6);
  const wMat = new THREE.MeshBasicMaterial({color: 0x222222});
  const wInst = new THREE.InstancedMesh(wGeo, wMat, 4);
  [[-1,.3,1.1],[1,.3,1.1],[-1,.3,-1.1],[1,.3,-1.1]].forEach((p, i) => {
    dummy.position.set(p[0], p[1], p[2]);
    dummy.rotation.set(0, 0, Math.PI/2);
    dummy.scale.setScalar(1);
    dummy.updateMatrix();
    wInst.setMatrixAt(i, dummy.matrix);
  });
  wInst.instanceMatrix.needsUpdate = true;
  car.add(wInst);
}
scene.add(car);

// ---- TRAFFIC — 1 InstancedMesh (STATIC Z update via matrix) ----
const TRAFFIC_N = 4;
const trafficSpeeds = [];
const trafficPositions = []; // cache Z positions to avoid matrix reads
const trafficInst = (() => {
  const geo = new THREE.BoxGeometry(1.2, .45, 2.5);
  const mat = new THREE.MeshBasicMaterial();
  const inst = new THREE.InstancedMesh(geo, mat, TRAFFIC_N);
  const tColors = [0xff3300, 0xffaa00, 0x00ff88, 0xff00aa];
  for (let i = 0; i < TRAFFIC_N; i++) {
    const x = i % 2 === 0 ? 1.5 : -1.5;
    const z = -40 - i * 25;
    dummy.position.set(x, .4, z);
    dummy.scale.setScalar(1);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
    inst.setColorAt(i, _col.setHex(tColors[i]));
    trafficSpeeds.push(.12 + Math.random() * .08);
    trafficPositions.push({x, z});
  }
  inst.instanceMatrix.needsUpdate = true;
  inst.instanceColor.needsUpdate = true;
  return inst;
})();
scene.add(trafficInst);

// ---- INPUT ----
const keys = {};
addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
addEventListener('keyup', e => { keys[e.code] = false; });

let cTh = 0, cPh = .55, mx = 0, my = 0, drag = false;
addEventListener('mousedown', e => { drag = true; mx = e.clientX; my = e.clientY; });
addEventListener('mouseup', () => drag = false);
addEventListener('mousemove', e => {
  if (!drag) return;
  cTh += (e.clientX - mx) * .005;
  cPh = Math.max(.15, Math.min(1.3, cPh - (e.clientY - my) * .005));
  mx = e.clientX; my = e.clientY;
});
addEventListener('touchstart', e => { drag = true; mx = e.touches[0].clientX; my = e.touches[0].clientY; }, {passive: true});
addEventListener('touchend', () => drag = false);
addEventListener('touchmove', e => {
  if (!drag) return;
  cTh += (e.touches[0].clientX - mx) * .005;
  cPh = Math.max(.15, Math.min(1.3, cPh - (e.touches[0].clientY - my) * .005));
  mx = e.touches[0].clientX; my = e.touches[0].clientY;
}, {passive: true});

// ---- STATE ----
let spd = 0, dir = 0, fc = 0;
const hudEl = document.getElementById('hud');
const fpsEl = document.getElementById('fps');
let fpsTime = performance.now(), fpsFrames = 0;

// ---- ANIMATE — ZERO ALLOCATIONS ----
function animate() {
  requestAnimationFrame(animate);
  fc++;

  // FPS
  fpsFrames++;
  const now = performance.now();
  if (now - fpsTime >= 1000) {
    fpsEl.textContent = fpsFrames + ' FPS | ' + renderer.info.render.calls + ' draws';
    fpsFrames = 0;
    fpsTime = now;
    renderer.info.reset();
  }

  // Car physics
  if (keys.ArrowUp || keys.KeyW) spd = Math.min(.28, spd + .013);
  else if (keys.ArrowDown || keys.KeyS) spd = Math.max(-.14, spd - .013);
  else spd *= .978;

  if (Math.abs(spd) > .002) {
    if (keys.ArrowLeft || keys.KeyA) dir += .038 * Math.sign(spd);
    if (keys.ArrowRight || keys.KeyD) dir -= .038 * Math.sign(spd);
  }

  car.rotation.y = dir;
  car.position.x += Math.sin(dir) * spd;
  car.position.z += Math.cos(dir) * spd;

  // Camera
  _cv.set(
    car.position.x - Math.sin(dir + cTh) * 14,
    6 + cPh * 4,
    car.position.z - Math.cos(dir + cTh) * 14
  );
  cam.position.lerp(_cv, .08);
  _ct.set(car.position.x, 1.5, car.position.z);
  cam.lookAt(_ct);

  // Traffic — update cached positions, write matrices
  for (let i = 0; i < TRAFFIC_N; i++) {
    trafficPositions[i].z += trafficSpeeds[i];
    if (trafficPositions[i].z > 40) trafficPositions[i].z = -100;
    dummy.position.set(trafficPositions[i].x, .4, trafficPositions[i].z);
    dummy.scale.setScalar(1);
    dummy.rotation.set(0, 0, 0);
    dummy.updateMatrix();
    trafficInst.setMatrixAt(i, dummy.matrix);
  }
  trafficInst.instanceMatrix.needsUpdate = true;

  // Rings — every 6th frame
  if (fc % 6 === 0) {
    const t = fc * .016;
    for (let i = 0; i < rings.length; i++) {
      rings[i].m.rotation.z += .02;
      rings[i].m.position.y = rings[i].y + Math.sin(t * .5 + rings[i].p) * .6;
    }
  }

  // HUD — every 12th frame
  if (fc % 12 === 0) {
    hudEl.textContent = Math.abs(Math.round(spd * 200)) + ' KM/H';
  }

  renderer.render(scene, cam);
}

animate();

addEventListener('resize', () => {
  cam.aspect = innerWidth / innerHeight;
  cam.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Debug
console.log('Scene children:', scene.children.length);
setTimeout(() => {
  renderer.info.reset();
  renderer.render(scene, cam);
  console.log('Draw calls:', renderer.info.render.calls, '| Triangles:', renderer.info.render.triangles);
}, 2000);
</script>
</body>
</html>
