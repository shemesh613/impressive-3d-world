<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>Cyber City 2084</title>
  <style>
    *{margin:0;padding:0}
    body{background:#000;overflow:hidden}
    canvas{display:block}
    #ui{position:fixed;top:20px;left:0;right:0;text-align:center;z-index:10;pointer-events:none}
    #ui h1{font:900 clamp(22px,4vw,50px) 'Segoe UI',sans-serif;letter-spacing:6px;
      background:linear-gradient(90deg,#0ff,#f0f,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    #ctrl{position:fixed;bottom:20px;left:0;right:0;text-align:center;color:rgba(255,255,255,.3);font:12px sans-serif;letter-spacing:3px;z-index:10;pointer-events:none}
    #speed{position:fixed;bottom:50px;right:25px;z-index:10;pointer-events:none;color:#0ff;font:bold 14px monospace}
    #fps{position:fixed;top:10px;right:10px;z-index:10;pointer-events:none;color:#0f0;font:11px monospace}
  </style>
</head>
<body>
<div id="ui"><h1>CYBER CITY 2084</h1></div>
<div id="ctrl">W A S D — Drive &nbsp;|&nbsp; Drag — Camera</div>
<div id="speed">0 KM/H</div>
<div id="fps"></div>

<script src="three.min.js"></script>
<script>
// ---- RENDERER ----
const R = new THREE.WebGLRenderer({antialias:false, powerPreference:'high-performance', stencil:false, depth:true});
R.setPixelRatio(1);
R.setSize(innerWidth, innerHeight);
R.setClearColor(0x050010);
R.sortObjects = false; // skip sorting — no transparent objects
document.body.prepend(R.domElement);

const scene = new THREE.Scene();
const cam = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 1, 200);
cam.position.set(0, 8, 16);

const D = new THREE.Object3D(); // reusable dummy

// ---- GROUND (1 draw call) ----
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(120, 120),
  new THREE.MeshBasicMaterial({color:0x0a0a18})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ---- ROAD (1 draw call — merged geometry) ----
{
  const geo = new THREE.Geometry();
  // Main road
  const road = new THREE.PlaneGeometry(6, 120);
  road.rotateX(-Math.PI/2);
  road.translate(0, 0.01, 0);
  geo.merge(road);
  // Edge lines
  [-3.2, 3.2].forEach(x => {
    const e = new THREE.PlaneGeometry(0.1, 120);
    e.rotateX(-Math.PI/2);
    e.translate(x, 0.02, 0);
    geo.merge(e);
  });
  scene.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x111125})));
}

// ---- ROAD MARKS (1 instanced) ----
{
  const g = new THREE.PlaneBufferGeometry(0.2, 2.5);
  const m = new THREE.MeshBasicMaterial({color:0xffdd00});
  const inst = new THREE.InstancedMesh(g, m, 16);
  for (let i=0;i<16;i++){
    D.position.set(0, 0.03, -45+i*6);
    D.rotation.set(-Math.PI/2,0,0);
    D.scale.set(1,1,1);
    D.updateMatrix();
    inst.setMatrixAt(i, D.matrix);
  }
  scene.add(inst);
}

// ---- BUILDINGS (1 instanced mesh — ALL buildings, single color) ----
const bdata = [
  [-8,-6,3,9,3],  [8,-6,3,11,3],
  [-12,-12,2.5,13,2.5], [12,-12,2.5,8,2.5],
  [-8,-18,3,7,3], [8,-18,3,15,3],
  [-12,-24,2,10,2], [12,-24,2,12,2],
  [-8,6,3,8,3],   [8,6,3,10,3],
  [-12,12,2.5,12,2.5], [12,12,2.5,7,2.5],
  [-8,18,3,6,3],  [8,18,3,9,3],
  [-12,24,2,11,2], [12,24,2,8,2],
];
{
  const geo = new THREE.BoxBufferGeometry(1,1,1);
  const mat = new THREE.MeshBasicMaterial({color:0x1a0a2e});
  const inst = new THREE.InstancedMesh(geo, mat, bdata.length);
  const colors = [0xff00ff,0x00f5ff,0x00ff88,0xffff00,0xff6600,0x8800ff];
  bdata.forEach((b,i) => {
    D.position.set(b[0], b[3]/2, b[1]);
    D.scale.set(b[2], b[3], b[4]);
    D.rotation.set(0,0,0);
    D.updateMatrix();
    inst.setMatrixAt(i, D.matrix);
    inst.setColorAt(i, new THREE.Color(colors[i % colors.length]));
  });
  inst.instanceColor.needsUpdate = true;
  scene.add(inst);
}

// ---- WINDOWS (1 instanced) ----
{
  const wp = [];
  bdata.forEach(b => {
    for(let y=0;y<Math.floor(b[3]/2);y++){
      for(let x=-1;x<=1;x++){
        if(Math.random()>.5) wp.push(b[0]+x*.7, y*1.3+1.5, b[1]+b[4]/2+.01);
      }
    }
  });
  const geo = new THREE.PlaneBufferGeometry(.4,.4);
  const mat = new THREE.MeshBasicMaterial({color:0xffff88});
  const n = wp.length/3;
  const inst = new THREE.InstancedMesh(geo, mat, n);
  for(let i=0;i<n;i++){
    D.position.set(wp[i*3],wp[i*3+1],wp[i*3+2]);
    D.scale.set(1,1,1); D.rotation.set(0,0,0);
    D.updateMatrix();
    inst.setMatrixAt(i, D.matrix);
  }
  scene.add(inst);
}

// ---- LAMPS (1 instanced) ----
{
  const geo = new THREE.SphereBufferGeometry(.2,4,4);
  const mat = new THREE.MeshBasicMaterial({color:0xffffaa});
  const positions = [];
  for(let z=-40;z<40;z+=12){positions.push([-5.5,z],[5.5,z]);}
  const inst = new THREE.InstancedMesh(geo, mat, positions.length);
  positions.forEach(([x,z],i)=>{
    D.position.set(x,4.5,z); D.scale.set(1,1,1); D.updateMatrix();
    inst.setMatrixAt(i, D.matrix);
  });
  scene.add(inst);
}

// ---- ARCHES (1 instanced — all bars + posts merged conceptually as cylinders) ----
{
  const geo = new THREE.CylinderBufferGeometry(.06,.06,1,4);
  const mat = new THREE.MeshBasicMaterial({color:0x00f5ff});
  const archZ = [-15,-25,-35,-45];
  // 4 arches * 3 parts = 12 instances
  const inst = new THREE.InstancedMesh(geo, mat, archZ.length * 3);
  const archColors = [0x00f5ff,0xff00ff,0xffff00,0x00ff88];
  let idx = 0;
  archZ.forEach((z,ai) => {
    // top bar (horizontal)
    D.position.set(0,5,z); D.rotation.set(0,0,Math.PI/2); D.scale.set(1,7,1);
    D.updateMatrix(); inst.setMatrixAt(idx, D.matrix);
    inst.setColorAt(idx, new THREE.Color(archColors[ai]));
    idx++;
    // 2 posts
    [-3.5,3.5].forEach(x => {
      D.position.set(x,2.5,z); D.rotation.set(0,0,0); D.scale.set(1,5,1);
      D.updateMatrix(); inst.setMatrixAt(idx, D.matrix);
      inst.setColorAt(idx, new THREE.Color(archColors[ai]));
      idx++;
    });
  });
  inst.instanceColor.needsUpdate = true;
  scene.add(inst);
}

// ---- RINGS (4 — kept as individual for animation) ----
const rings = [];
[{z:-10,c:0x00f5ff},{z:-30,c:0xff00ff},{z:-50,c:0xffff00},{z:-70,c:0x00ff88}].forEach(({z,c},i)=>{
  const r = new THREE.Mesh(new THREE.TorusBufferGeometry(4,.06,4,24), new THREE.MeshBasicMaterial({color:c}));
  r.position.set(0,5,z); r.rotation.x=Math.PI/2;
  scene.add(r); rings.push({m:r,y:5,p:i*1.5});
});

// ---- SKY (1 draw) ----
scene.add(new THREE.Mesh(
  new THREE.SphereBufferGeometry(100,8,4),
  new THREE.MeshBasicMaterial({color:0x030012,side:THREE.BackSide})
));

// ---- STARS (1 Points draw) ----
{
  const p = new Float32Array(150*3);
  for(let i=0;i<150;i++){p[i*3]=(Math.random()-.5)*200;p[i*3+1]=Math.random()*60+10;p[i*3+2]=(Math.random()-.5)*200;}
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.BufferAttribute(p,3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({color:0xffffff,size:.15})));
}

// ---- MOON (1 draw) ----
{
  const m = new THREE.Mesh(new THREE.SphereBufferGeometry(3,6,6), new THREE.MeshBasicMaterial({color:0xddeeff}));
  m.position.set(-35,45,-70); scene.add(m);
}

// ---- CAR ----
const car = new THREE.Group();
// Body + cabin + headlights + taillights = merged geometry
{
  const geo = new THREE.Geometry();
  // Body
  const body = new THREE.BoxGeometry(1.8,.6,3.6);
  body.translate(0,.5,0); geo.merge(body);
  // Cabin
  const cabin = new THREE.BoxGeometry(1.4,.5,2);
  cabin.translate(0,1.05,-.15); geo.merge(cabin);
  car.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0x00ccff})));
}
// Headlights merged
{
  const geo = new THREE.Geometry();
  [-0.5,0.5].forEach(x=>{
    const h=new THREE.BoxGeometry(.25,.12,.04);
    h.translate(x,.5,1.81); geo.merge(h);
  });
  car.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0xffffcc})));
}
// Taillights merged
{
  const geo = new THREE.Geometry();
  [-0.6,0.6].forEach(x=>{
    const t=new THREE.BoxGeometry(.22,.1,.04);
    t.translate(x,.5,-1.82); geo.merge(t);
  });
  car.add(new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color:0xff2200})));
}
// Wheels — 1 instanced
{
  const g = new THREE.CylinderBufferGeometry(.3,.3,.25,6);
  const m = new THREE.MeshBasicMaterial({color:0x222222});
  const inst = new THREE.InstancedMesh(g,m,4);
  [[-1,.3,1.1],[1,.3,1.1],[-1,.3,-1.1],[1,.3,-1.1]].forEach((p,i)=>{
    D.position.set(...p); D.rotation.set(0,0,Math.PI/2); D.scale.set(1,1,1);
    D.updateMatrix(); inst.setMatrixAt(i, D.matrix);
  });
  car.add(inst);
}
scene.add(car);

// ---- TRAFFIC (1 instanced) ----
const trafficCount = 4;
const trafficSpeeds = [];
const trafficInst = new THREE.InstancedMesh(
  new THREE.BoxBufferGeometry(1.2,.45,2.5),
  new THREE.MeshBasicMaterial({color:0xff3300}),
  trafficCount
);
const tColors = [0xff3300,0xffaa00,0x00ff88,0xff00aa];
for(let i=0;i<trafficCount;i++){
  D.position.set(i%2===0?1.5:-1.5, .4, -40-i*25);
  D.scale.set(1,1,1); D.rotation.set(0,0,0); D.updateMatrix();
  trafficInst.setMatrixAt(i, D.matrix);
  trafficInst.setColorAt(i, new THREE.Color(tColors[i]));
  trafficSpeeds.push(.12+Math.random()*.08);
}
trafficInst.instanceColor.needsUpdate = true;
scene.add(trafficInst);

// ---- INPUT ----
const keys = {};
addEventListener('keydown', e=>{keys[e.code]=true;e.preventDefault()});
addEventListener('keyup', e=>{keys[e.code]=false});
let cTh=0,cPh=.55,mx=0,my=0,drag=false;
addEventListener('mousedown',e=>{drag=true;mx=e.clientX;my=e.clientY});
addEventListener('mouseup',()=>drag=false);
addEventListener('mousemove',e=>{
  if(!drag)return;
  cTh+=(e.clientX-mx)*.005; cPh=Math.max(.15,Math.min(1.3,cPh-(e.clientY-my)*.005));
  mx=e.clientX;my=e.clientY;
});
addEventListener('touchstart',e=>{drag=true;mx=e.touches[0].clientX;my=e.touches[0].clientY},{passive:true});
addEventListener('touchend',()=>drag=false);
addEventListener('touchmove',e=>{
  if(!drag)return;
  cTh+=(e.touches[0].clientX-mx)*.005;cPh=Math.max(.15,Math.min(1.3,cPh-(e.touches[0].clientY-my)*.005));
  mx=e.touches[0].clientX;my=e.touches[0].clientY;
},{passive:true});

// ---- STATE ----
let spd=0,dir=0,fc=0;
const MS=.28,AC=.013,BR=.022,TN=.038;
const cp=new THREE.Vector3(), ct=new THREE.Vector3();
const speedEl=document.getElementById('speed');
const fpsEl=document.getElementById('fps');
let lt=performance.now(),frames=0;

// Temp matrix for traffic updates
const tMat = new THREE.Matrix4();

// ---- ANIMATE ----
function animate(){
  requestAnimationFrame(animate);
  fc++;

  // FPS counter
  frames++;
  const now=performance.now();
  if(now-lt>=1000){fpsEl.textContent=frames+' FPS';frames=0;lt=now;}

  // Car physics
  if(keys.ArrowUp||keys.KeyW) spd=Math.min(MS,spd+AC);
  else if(keys.ArrowDown||keys.KeyS) spd=Math.max(-MS*.5,spd-AC);
  else spd*=(1-BR);
  if(Math.abs(spd)>.002){
    if(keys.ArrowLeft||keys.KeyA) dir+=TN*Math.sign(spd);
    if(keys.ArrowRight||keys.KeyD) dir-=TN*Math.sign(spd);
  }
  car.rotation.y=dir;
  car.position.x+=Math.sin(dir)*spd;
  car.position.z+=Math.cos(dir)*spd;

  // Camera (smooth follow)
  cp.set(car.position.x-Math.sin(dir+cTh)*14, 6+cPh*4, car.position.z-Math.cos(dir+cTh)*14);
  cam.position.lerp(cp,.08);
  ct.set(car.position.x,1.5,car.position.z);
  cam.lookAt(ct);

  // Traffic — update instanced matrices
  for(let i=0;i<trafficCount;i++){
    trafficInst.getMatrixAt(i, tMat);
    const pos = new THREE.Vector3();
    pos.setFromMatrixPosition(tMat);
    pos.z += trafficSpeeds[i];
    if(pos.z>40) pos.z=-100;
    tMat.setPosition(pos);
    trafficInst.setMatrixAt(i, tMat);
  }
  trafficInst.instanceMatrix.needsUpdate = true;

  // Every 6th frame: rings
  if(fc%6===0){
    const t=fc*.016;
    rings.forEach(r=>{r.m.rotation.z+=.02;r.m.position.y=r.y+Math.sin(t*.5+r.p)*.6;});
  }

  // Every 10th frame: HUD
  if(fc%10===0) speedEl.textContent=Math.abs(Math.round(spd*200))+' KM/H';

  R.render(scene,cam);
}
animate();

addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});

console.log('Draw calls target:', scene.children.length, 'objects');
</script>
</body>
</html>
