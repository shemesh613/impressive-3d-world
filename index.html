<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>עולם תלת-ממדי</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    #c { display: block; width: 100vw; height: 100vh; filter: contrast(1.05) saturate(1.2); }
    #ui {
      position: fixed; top: 30px; left: 0; right: 0;
      text-align: center; z-index: 10; pointer-events: none;
    }
    #ui h1 {
      font-size: clamp(24px, 4vw, 60px);
      font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(90deg, #00f5ff, #ff00ff, #ffff00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #ui p { color: rgba(255,255,255,0.4); letter-spacing: 5px; margin-top: 8px; font-size: 13px; }
    #hint { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      color: rgba(0,245,255,0.6); font-size: 13px; letter-spacing: 4px; z-index: 10;
      pointer-events: none; animation: hintFade 3s ease-in-out forwards; }
    @keyframes hintFade { 0%{opacity:0} 20%{opacity:1} 80%{opacity:1} 100%{opacity:0} }
    #ctrl {
      position: fixed; bottom: 25px; left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,0.35);
      font-size: 12px; letter-spacing: 3px; z-index: 10; pointer-events: none;
    }
    #hud {
      position: fixed; bottom: 55px; right: 30px;
      z-index: 10; pointer-events: none; text-align: right;
    }
    #speedbar {
      width: 120px; height: 4px; background: rgba(255,255,255,0.1);
      border-radius: 2px; margin-top: 4px; overflow: hidden;
    }
    #speedfill {
      height: 100%; width: 0%; background: linear-gradient(90deg, #00f5ff, #ff00ff);
      border-radius: 2px; transition: width 0.1s;
    }
    #speednum { color: #00f5ff; font-size: 11px; letter-spacing: 2px; font-family: monospace; }
    #gauge {
      position: fixed; bottom: 20px; right: 20px; z-index: 10; pointer-events: none;
      width: 90px; height: 90px;
    }
    #scanlines {
      position: fixed; inset: 0; z-index: 7; pointer-events: none;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
    }
    #minimap { border-color: rgba(0,245,255,0.6); box-shadow: 0 0 10px rgba(0,245,255,0.3); }
    #minimap {
      position: fixed; bottom: 55px; left: 20px; z-index: 10;
      width: 100px; height: 100px; border: 1px solid rgba(0,245,255,0.4);
      background: rgba(0,0,0,0.5); border-radius: 4px; pointer-events: none;
    }
    #minimap canvas { width: 100%; height: 100%; }
    #speedlines {
      position: fixed; inset: 0; z-index: 8; pointer-events: none;
      opacity: 0; transition: opacity 0.1s;
      background: radial-gradient(ellipse at center, transparent 30%, transparent 60%, rgba(0,200,255,0.08) 80%, rgba(0,200,255,0.15) 100%);
    }
    #err {
      position: fixed; inset: 0; display: none; align-items: center; justify-content: center;
      background: #000; color: #ff4444; font-size: 20px; text-align: center; z-index: 99;
    }
    #vignette {
      position: fixed; inset: 0; z-index: 9; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%);
    }
    #ui h1 {
      text-shadow: 0 0 30px rgba(0,245,255,0.8), 0 0 60px rgba(255,0,255,0.4);
      animation: titlePulse 2s ease-in-out infinite;
    }
    @keyframes titlePulse {
      0%,100% { text-shadow: 0 0 30px rgba(0,245,255,0.8), 0 0 60px rgba(255,0,255,0.4); }
      50% { text-shadow: 0 0 50px rgba(0,245,255,1), 0 0 100px rgba(255,0,255,0.8), 0 0 150px rgba(255,255,0,0.3); }
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h1>עולם תלת-ממדי</h1>
  <p>✦ INTERACTIVE 3D WORLD ✦</p>
</div>
<div id="vignette"></div>
<div id="hint">✦ W A S D לנהיגה &nbsp;|&nbsp; CLICK לניצוצות ✦</div>
<div id="scanlines"></div>
<div id="speedlines"></div>
<div id="minimap"><canvas id="mmCanvas" width="100" height="100"></canvas></div>
<div id="ctrl">W A S D — נהיגה &nbsp;|&nbsp; גרור עכבר — סיבוב מצלמה</div>
<canvas id="gauge" width="90" height="90"></canvas>
<div id="hud" style="display:none">
  <div id="speednum">0 KM/H</div>
  <div id="speedbar"><div id="speedfill"></div></div>
</div>
<div id="err"><div>WebGL לא נתמך בדפדפן זה<br><small>נסה Chrome</small></div></div>

<script src="three.min.js"></script>
<script>
// WebGL check
if (!window.WebGLRenderingContext) {
  document.getElementById('err').style.display = 'flex';
  throw new Error('No WebGL');
}

// ---- RENDERER ----
const canvas = document.getElementById('c');
let renderer;
try {
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
} catch(e) {
  document.getElementById('err').style.display = 'flex';
  throw e;
}
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.setClearColor(0x05000f);

// ---- SCENE & CAMERA ----
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05000f, 0.025);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 8, 16);

// ---- LIGHTS ----
scene.add(new THREE.AmbientLight(0x221133, 2));

const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(15, 30, 15);
sun.castShadow = true;
sun.shadow.mapSize.set(1024, 1024);
sun.shadow.camera.near = 0.1;
sun.shadow.camera.far = 150;
sun.shadow.camera.left = sun.shadow.camera.bottom = -40;
sun.shadow.camera.right = sun.shadow.camera.top = 40;
scene.add(sun);

const pLights = [];
[
  { color: 0x00f5ff, pos: new THREE.Vector3(-10, 5, 0) },
  { color: 0xff00ff, pos: new THREE.Vector3(10, 5, 0) },
  { color: 0xffff00, pos: new THREE.Vector3(0, 5, -10) },
].forEach(d => {
  const l = new THREE.PointLight(d.color, 3, 25);
  l.position.copy(d.pos);
  scene.add(l);
  pLights.push({ light: l, origin: d.pos.clone() });
});

// ---- GROUND ----
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshStandardMaterial({ color: 0x0d0d1a, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

// ---- GROUND CRACKS ----
const crackMat = new THREE.MeshStandardMaterial({ color: 0x00f5ff, emissive: 0x00f5ff, emissiveIntensity: 1.5 });
[[-15,-8],[15,-8],[-20,5],[20,5],[-10,-20],[10,-20],[-25,-15],[25,15]].forEach(([x,z]) => {
  const len = Math.random()*4+2;
  const crack = new THREE.Mesh(new THREE.PlaneGeometry(0.06, len), crackMat);
  crack.rotation.x = -Math.PI/2;
  crack.rotation.z = Math.random()*Math.PI;
  crack.position.set(x + (Math.random()-0.5)*5, 0.005, z + (Math.random()-0.5)*5);
  scene.add(crack);
});

// Grid - brighter
const grid = new THREE.GridHelper(100, 50, 0x00f5ff, 0x220055);
grid.material.opacity = 0.4;
grid.material.transparent = true;
scene.add(grid);

// ---- NEBULA SKY ----
function makeNebula(color, x, y, z, size, opacity) {
  const geo = new THREE.PlaneGeometry(size, size);
  const mat = new THREE.MeshBasicMaterial({ color, transparent: true, opacity, side: THREE.DoubleSide, depthWrite: false });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(x, y, z);
  m.lookAt(0, y, 0);
  scene.add(m);
}
makeNebula(0x220066, -60, 40, -80, 120, 0.15);
makeNebula(0x660033, 60, 50, -80, 100, 0.12);
makeNebula(0x003355, 0, 60, -100, 150, 0.1);
makeNebula(0x440066, -30, 30, -60, 80, 0.08);

// ---- FLOATING PARTICLES ----
const floatPositions = [];
for (let i = 0; i < 500; i++) {
  floatPositions.push(
    (Math.random() - 0.5) * 60,
    Math.random() * 15 + 1,
    (Math.random() - 0.5) * 60
  );
}
const floatGeo = new THREE.BufferGeometry();
floatGeo.setAttribute('position', new THREE.Float32BufferAttribute(floatPositions, 3));
const floatMat = new THREE.PointsMaterial({ color: 0x88ddff, size: 0.12, transparent: true, opacity: 0.6 });
const floatParticles = new THREE.Points(floatGeo, floatMat);
scene.add(floatParticles);

// ---- ROAD ----
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(6, 100),
  new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.95 })
);
road.rotation.x = -Math.PI / 2;
road.position.y = 0.01;
road.receiveShadow = true;
scene.add(road);

for (let z = -45; z < 45; z += 6) {
  const mark = new THREE.Mesh(
    new THREE.PlaneGeometry(0.25, 3),
    new THREE.MeshStandardMaterial({ color: 0xffdd00, emissive: 0xffaa00, emissiveIntensity: 0.8 })
  );
  mark.rotation.x = -Math.PI / 2;
  mark.position.set(0, 0.02, z);
  scene.add(mark);
}

// ---- SHOOTING STARS ----
const shootingStars = [];
function spawnShootingStar() {
  const geo = new THREE.BufferGeometry();
  const pts = new Float32Array(6);
  pts[0] = (Math.random()-0.5)*200; pts[1] = 40+Math.random()*40; pts[2] = -50-Math.random()*80;
  pts[3] = pts[0]+10; pts[4] = pts[1]-5; pts[5] = pts[2]+10;
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pts, 3));
  const mat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.9 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);
  shootingStars.push({ line, life: 1.0, vx: 0.8, vy: -0.4, vz: 0.8 });
}
setInterval(spawnShootingStar, 3000);

// ---- STARS ----
const starPositions = [];
for (let i = 0; i < 2000; i++) {
  starPositions.push(
    (Math.random() - 0.5) * 300,
    Math.random() * 80 + 10,
    (Math.random() - 0.5) * 300
  );
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.2, transparent: true, opacity: 0.7 })));

// ---- NEON ARCHES ----
function makeArch(z, color) {
  const archGroup = new THREE.Group();
  // left post
  const postMat = new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 2 });
  [-3.5, 3.5].forEach(x => {
    const post = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 5, 8), postMat);
    post.position.set(x, 2.5, 0);
    archGroup.add(post);
  });
  // top bar
  const bar = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 7.2, 8), postMat);
  bar.rotation.z = Math.PI / 2;
  bar.position.set(0, 5.1, 0);
  archGroup.add(bar);
  // glow
  const pl = new THREE.PointLight(color, 1.5, 10);
  pl.position.set(0, 5, 0);
  archGroup.add(pl);
  archGroup.position.z = z;
  scene.add(archGroup);
}
makeArch(-12, 0x00f5ff);
makeArch(-22, 0xff00ff);
makeArch(-32, 0xffff00);
makeArch(-42, 0x00ff88);
makeArch(-52, 0xff6600);

// ---- NEON CLOUDS ----
const cloudGroup = new THREE.Group();
[[0x440066,0,45,-60],[0x003344,-30,50,-80],[0x220033,30,42,-70]].forEach(([c,x,y,z]) => {
  for(let i=0;i<5;i++){
    const sphere = new THREE.Mesh(
      new THREE.SphereGeometry(4+Math.random()*4, 7, 5),
      new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.12, depthWrite: false })
    );
    sphere.position.set(x+i*5-10, y+Math.random()*3, z+Math.random()*8);
    cloudGroup.add(sphere);
  }
});
scene.add(cloudGroup);

// ---- CLICK SPARKS ----
const sparkParticles = [];
function spawnSparks(x, y, z, color) {
  for(let i=0;i<15;i++){
    const spark = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 4, 4),
      new THREE.MeshBasicMaterial({ color: color || 0xffff00 })
    );
    spark.position.set(x,y,z);
    const vel = new THREE.Vector3((Math.random()-0.5)*0.3, Math.random()*0.4+0.1, (Math.random()-0.5)*0.3);
    scene.add(spark);
    sparkParticles.push({ mesh: spark, vel, life: 1.0 });
  }
}
renderer.domElement.addEventListener('click', (e) => {
  const colors = [0x00f5ff, 0xff00ff, 0xffff00, 0x00ff88, 0xff6600];
  spawnSparks(car.position.x+(Math.random()-0.5)*4, 0.5, car.position.z+(Math.random()-0.5)*4,
    colors[Math.floor(Math.random()*colors.length)]);
});

// ---- RAIN ----
const rainCount = 800;
const rainPos = new Float32Array(rainCount * 3);
for (let i = 0; i < rainCount; i++) {
  rainPos[i*3]   = (Math.random()-0.5)*80;
  rainPos[i*3+1] = Math.random()*30;
  rainPos[i*3+2] = (Math.random()-0.5)*80;
}
const rainGeo = new THREE.BufferGeometry();
rainGeo.setAttribute('position', new THREE.Float32BufferAttribute(rainPos, 3));
const rainMat = new THREE.PointsMaterial({ color: 0x99ccff, size: 0.08, transparent: true, opacity: 0.4 });
const rain = new THREE.Points(rainGeo, rainMat);
scene.add(rain);

// ---- SKY DOME ----
const skyDome = new THREE.Mesh(
  new THREE.SphereGeometry(150, 32, 16),
  new THREE.MeshBasicMaterial({
    color: 0x05001a,
    side: THREE.BackSide,
  })
);
scene.add(skyDome);

// Sky gradient bands
[[0x110033, 0, -60, 80, 15], [0x220011, -20, -60, 80, 10], [0x001133, 20, -60, 80, 10]].forEach(([c,x,z,w,h]) => {
  const m = new THREE.Mesh(
    new THREE.PlaneGeometry(w, h),
    new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.5, side: THREE.DoubleSide, depthWrite: false })
  );
  m.position.set(x, 20, z);
  scene.add(m);
});

// ---- ENERGY ORBS ----
const orbColors = [0x00f5ff, 0xff00ff, 0xffff00, 0x00ff88, 0xff6600, 0x8800ff];
const orbs = [];
orbColors.forEach((c, i) => {
  const orb = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 12, 12),
    new THREE.MeshStandardMaterial({ color: c, emissive: c, emissiveIntensity: 3 })
  );
  const angle = (i / orbColors.length) * Math.PI * 2;
  orb.position.set(Math.cos(angle) * 12, 4 + Math.sin(angle) * 2, Math.sin(angle) * 12 - 10);
  scene.add(orb);
  const pl = new THREE.PointLight(c, 2, 10);
  orb.add(pl);
  orbs.push({ mesh: orb, angle, speed: 0.3 + Math.random() * 0.3 });
});

// ---- AURORA ----
const auroraColors = [0x00ff88, 0x0088ff, 0xff00ff, 0x00ffff];
const auroraPlanes = [];
auroraColors.forEach((c, i) => {
  const geo = new THREE.PlaneGeometry(180, 25);
  const mat = new THREE.MeshBasicMaterial({ color: c, transparent: true, opacity: 0.06, side: THREE.DoubleSide, depthWrite: false });
  const m = new THREE.Mesh(geo, mat);
  m.position.set(0, 35 + i * 8, -70);
  m.rotation.x = -0.3 + i * 0.1;
  scene.add(m);
  auroraPlanes.push(m);
});

// ---- MOON ----
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(4, 16, 16),
  new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xaaccff, emissiveIntensity: 1.5 })
);
moon.position.set(-40, 50, -80);
scene.add(moon);
const moonLight = new THREE.PointLight(0xaaccff, 1.5, 200);
moonLight.position.copy(moon.position);
scene.add(moonLight);

// ---- STREET LAMPS ----
function makeLamp(x, z) {
  const g = new THREE.Group();
  // pole
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.07, 0.1, 5, 6),
    new THREE.MeshStandardMaterial({ color: 0x444466, metalness: 0.9, roughness: 0.3 })
  );
  pole.position.y = 2.5;
  g.add(pole);
  // arm
  const arm = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.05, 1.5, 6),
    new THREE.MeshStandardMaterial({ color: 0x444466, metalness: 0.9 })
  );
  arm.rotation.z = Math.PI / 2;
  arm.position.set(Math.sign(x) * 0.75, 5, 0);
  g.add(arm);
  // bulb
  const bulb = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 5 })
  );
  bulb.position.set(Math.sign(x) * 1.5, 5, 0);
  g.add(bulb);
  // light
  const pl = new THREE.PointLight(0xffeeaa, 2.5, 12);
  pl.position.copy(bulb.position);
  g.add(pl);

  g.position.set(x, 0, z);
  scene.add(g);
}
for (let z = -40; z < 40; z += 10) {
  makeLamp(-4.5, z);
  makeLamp(4.5, z);
}

// ---- BUILDINGS ----
function makeBuilding(x, z, w, h, d, color) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, d),
    new THREE.MeshStandardMaterial({ color, roughness: 0.5, metalness: 0.5, emissive: color, emissiveIntensity: 0.08 })
  );
  mesh.position.set(x, h / 2, z);
  mesh.castShadow = mesh.receiveShadow = true;
  scene.add(mesh);

  // windows
  const wColors = [0xffff88, 0x88ffff, 0xff88ff];
  const wc = wColors[Math.floor(Math.random() * 3)];
  for (let iy = 0; iy < Math.floor(h / 2); iy++) {
    for (let ix = -1; ix <= 1; ix++) {
      if (Math.random() > 0.35) {
        const win = new THREE.Mesh(
          new THREE.PlaneGeometry(0.5, 0.5),
          new THREE.MeshStandardMaterial({ color: wc, emissive: wc, emissiveIntensity: Math.random() * 2 + 0.5 })
        );
        win.position.set(x + ix * 0.8, iy * 1.4 + 1.5, z + d / 2 + 0.01);
        scene.add(win);
      }
    }
  }
}

// ---- ROAD EDGE STRIPS ----
[-3.2, 3.2].forEach(x => {
  const strip = new THREE.Mesh(
    new THREE.PlaneGeometry(0.15, 100),
    new THREE.MeshStandardMaterial({ color: 0x00f5ff, emissive: 0x00f5ff, emissiveIntensity: 2 })
  );
  strip.rotation.x = -Math.PI / 2;
  strip.position.set(x, 0.015, 0);
  scene.add(strip);
  const glow = new THREE.PointLight(0x00f5ff, 0.5, 8);
  glow.position.set(x, 0.5, 0);
  scene.add(glow);
});

// ---- HORIZON GLOW ----
const horizonGeo = new THREE.PlaneGeometry(200, 20);
const horizonMat = new THREE.MeshBasicMaterial({ color: 0x220044, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
const horizon = new THREE.Mesh(horizonGeo, horizonMat);
horizon.position.set(0, 10, -90);
scene.add(horizon);

// Horizon light band - raised high so it doesn't block view
const hband = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 3),
  new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.2, side: THREE.DoubleSide })
);
hband.position.set(0, 8, -89);
scene.add(hband);

// ---- CANVAS TEXT SIGNS ----
function makeTextSign(text, x, y, z, color, rotY) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 80;
  const cx = cv.getContext('2d');
  cx.fillStyle = 'rgba(0,0,0,0.85)';
  cx.fillRect(0, 0, 256, 80);
  cx.strokeStyle = color;
  cx.lineWidth = 3;
  cx.strokeRect(3, 3, 250, 74);
  cx.fillStyle = color;
  cx.shadowColor = color;
  cx.shadowBlur = 18;
  cx.font = 'bold 32px Arial';
  cx.textAlign = 'center';
  cx.textBaseline = 'middle';
  cx.fillText(text, 128, 42);
  const tex = new THREE.CanvasTexture(cv);
  const mesh = new THREE.Mesh(
    new THREE.PlaneGeometry(3.5, 1.1),
    new THREE.MeshBasicMaterial({ map: tex, transparent: true })
  );
  mesh.position.set(x, y, z);
  mesh.rotation.y = rotY || 0;
  scene.add(mesh);
  const pl = new THREE.PointLight(new THREE.Color(color), 1, 6);
  pl.position.set(x, y, z + 0.5);
  scene.add(pl);
}
makeTextSign('NEON CITY', -9.5, 10, -7, '#00ffff', 0);
makeTextSign('HOTEL ✦', 9.5, 12, -9, '#ff00ff', Math.PI);
makeTextSign('CYBER BAR', -9.5, 8, -17, '#ffff00', 0);
makeTextSign('CLUB 3D', 9.5, 9, -19, '#ff6600', Math.PI);
makeTextSign('FUTURE', -9.5, 11, 7, '#00ff88', 0);
makeTextSign('DRIVE ▶', 9.5, 8, 9, '#ff0088', Math.PI);

// ---- NEON SIGNS ----
function makeSign(x, y, z, color, w, h) {
  const frame = new THREE.Mesh(
    new THREE.BoxGeometry(w, h, 0.1),
    new THREE.MeshStandardMaterial({ color, emissive: color, emissiveIntensity: 3, wireframe: false })
  );
  frame.position.set(x, y, z);
  scene.add(frame);
  const inner = new THREE.Mesh(
    new THREE.BoxGeometry(w*0.7, h*0.5, 0.05),
    new THREE.MeshStandardMaterial({ color: 0x000000 })
  );
  inner.position.set(x, y, z+0.08);
  scene.add(inner);
  const pl = new THREE.PointLight(color, 1.5, 8);
  pl.position.set(x, y, z+1);
  scene.add(pl);
}
makeSign(-9.5, 7, -8, 0x00ffff, 2.5, 1);
makeSign(9.5, 9, -10, 0xff00ff, 3, 1.2);
makeSign(-9.5, 5, -16, 0xffff00, 2, 0.8);
makeSign(9.5, 6, -18, 0x00ff88, 2.8, 1);
makeSign(-9.5, 8, 6, 0xff6600, 2.2, 0.9);
makeSign(9.5, 7, 8, 0x8800ff, 2.5, 1);

// building base pools of light

// ---- SYNTHWAVE AUDIO (user-triggered) ----
let audioStarted = false;
function startAudio() {
  if (audioStarted) return;
  audioStarted = true;
  const ac = new AudioContext();
  function note(freq, start, dur, vol=0.06) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sawtooth'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, ac.currentTime + start);
    g.gain.linearRampToValueAtTime(vol, ac.currentTime + start + 0.01);
    g.gain.linearRampToValueAtTime(0, ac.currentTime + start + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(ac.currentTime + start); o.stop(ac.currentTime + start + dur + 0.1);
  }
  function beat() {
    const seq = [110,0,138.6,0,110,0,164.8,146.8];
    seq.forEach((f,i) => { if(f) note(f, i*0.25, 0.22, 0.04); });
    note(55, 0, 2, 0.05); note(55, 2, 2, 0.05);
  }
  beat(); setInterval(beat, 2000);
}
document.addEventListener('keydown', startAudio, { once: true });
document.addEventListener('click', startAudio, { once: true });

}

// ---- INPUT ----
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

// ---- MOUSE CAM ----
let camTheta = 0, camPhi = 0.55, mx0 = 0, my0 = 0, dragging = false;
window.addEventListener('mousedown', e => { dragging = true; mx0 = e.clientX; my0 = e.clientY; });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta += (e.clientX - mx0) * 0.006;
  camPhi = Math.max(0.15, Math.min(1.3, camPhi - (e.clientY - my0) * 0.006));
  mx0 = e.clientX; my0 = e.clientY;
});

// touch
window.addEventListener('touchstart', e => { dragging = true; mx0 = e.touches[0].clientX; my0 = e.touches[0].clientY; }, { passive: true });
window.addEventListener('touchend', () => dragging = false);
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  camTheta += (e.touches[0].clientX - mx0) * 0.006;
  camPhi = Math.max(0.15, Math.min(1.3, camPhi - (e.touches[0].clientY - my0) * 0.006));
  mx0 = e.touches[0].clientX; my0 = e.touches[0].clientY;
}, { passive: true });

// ---- CAR STATE ----
let speed = 0, dir = 0;
const MAX_SPEED = 0.28, ACCEL = 0.013, BRAKE = 0.022, TURN = 0.038;
const camTarget = new THREE.Vector3();
const clock = new THREE.Clock();

// ---- ANIMATE ----
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // car controls
  if (keys['ArrowUp'] || keys['KeyW']) speed = Math.min(MAX_SPEED, speed + ACCEL);
  else if (keys['ArrowDown'] || keys['KeyS']) speed = Math.max(-MAX_SPEED * 0.5, speed - ACCEL);
  else speed *= (1 - BRAKE);

  if (Math.abs(speed) > 0.002) {
    if (keys['ArrowLeft'] || keys['KeyA']) dir += TURN * Math.sign(speed);
    if (keys['ArrowRight'] || keys['KeyD']) dir -= TURN * Math.sign(speed);
  }

  car.rotation.y = dir;
  car.position.x += Math.sin(dir) * speed;
  car.position.z += Math.cos(dir) * speed;
  car.position.y = Math.abs(speed) > 0.01 ? Math.sin(t * 20) * 0.015 : 0;

  wheels.forEach(w => { w.rotation.x += speed * 4.5; });
  glow.intensity = 1.5 + Math.sin(t * 4) * 0.5;

  // camera
  const dist = 15, height = 7 + camPhi * 4;
  const cx = car.position.x - Math.sin(dir + camTheta) * dist;
  const cz = car.position.z - Math.cos(dir + camTheta) * dist;
  camera.position.lerp(new THREE.Vector3(cx, car.position.y + height, cz), 0.07);
  camTarget.lerp(new THREE.Vector3(car.position.x, car.position.y + 1.5, car.position.z), 0.1);
  camera.lookAt(camTarget);

  // animate point lights
  pLights.forEach((pl, i) => {
    const a = t * 0.4 + i * 2.1;
    pl.light.position.x = Math.sin(a) * 14;
    pl.light.position.z = Math.cos(a) * 14;
    pl.light.intensity = 2.5 + Math.sin(t * 2 + i) * 0.8;
  });

  // Traffic cars
  traffic.forEach(tc => {
    tc.group.position.z += tc.speed;
    if (tc.group.position.z > 30) tc.group.position.z = -100;
  });

  // Draw gauge
  const gc = document.getElementById('gauge');
  const gctx = gc.getContext('2d');
  const gcx = 45, gcy = 50, gr = 38;
  const kmhVal = Math.abs(speed) / MAX_SPEED;
  gctx.clearRect(0,0,90,90);
  // bg circle
  gctx.beginPath(); gctx.arc(gcx,gcy,gr,0,Math.PI*2);
  gctx.fillStyle='rgba(0,0,0,0.6)'; gctx.fill();
  gctx.strokeStyle='rgba(0,245,255,0.3)'; gctx.lineWidth=2; gctx.stroke();
  // track
  gctx.beginPath(); gctx.arc(gcx,gcy,gr-6, Math.PI*0.75, Math.PI*2.25);
  gctx.strokeStyle='rgba(255,255,255,0.1)'; gctx.lineWidth=6; gctx.stroke();
  // speed arc
  const endAngle = Math.PI*0.75 + kmhVal * Math.PI*1.5;
  const grad = gctx.createLinearGradient(0,0,90,0);
  grad.addColorStop(0,'#00f5ff'); grad.addColorStop(1,'#ff00ff');
  gctx.beginPath(); gctx.arc(gcx,gcy,gr-6, Math.PI*0.75, endAngle);
  gctx.strokeStyle=grad; gctx.lineWidth=6; gctx.stroke();
  // needle dot
  const needleA = Math.PI*0.75 + kmhVal*Math.PI*1.5;
  gctx.beginPath(); gctx.arc(gcx + Math.cos(needleA)*(gr-6), gcy + Math.sin(needleA)*(gr-6), 4, 0, Math.PI*2);
  gctx.fillStyle='#fff'; gctx.fill();
  // speed text
  gctx.fillStyle='#00f5ff'; gctx.font='bold 16px monospace';
  gctx.textAlign='center'; gctx.textBaseline='middle';
  gctx.fillText(Math.abs(Math.round(speed*200)), gcx, gcy-4);
  gctx.font='8px monospace'; gctx.fillStyle='rgba(255,255,255,0.5)';
  gctx.fillText('KM/H', gcx, gcy+10);

  // Animate clouds
  cloudGroup.position.x = Math.sin(t * 0.05) * 5;

  // Animate sparks
  for(let i = sparkParticles.length-1; i>=0; i--) {
    const s = sparkParticles[i];
    s.mesh.position.add(s.vel);
    s.vel.y -= 0.012;
    s.life -= 0.04;
    s.mesh.material.opacity = s.life;
    s.mesh.material.transparent = true;
    if(s.life <= 0) { scene.remove(s.mesh); sparkParticles.splice(i,1); }
  }

  // Pulse sky color
  const skyHue = (Math.sin(t*0.05)*0.05+0.75);
  renderer.setClearColor(new THREE.Color().setHSL(skyHue, 0.8, 0.02));

  // Animate shooting stars
  for (let i = shootingStars.length-1; i >= 0; i--) {
    const s = shootingStars[i];
    const pos = s.line.geometry.attributes.position;
    for (let j = 0; j < 2; j++) {
      pos.array[j*3] += s.vx; pos.array[j*3+1] += s.vy; pos.array[j*3+2] += s.vz;
    }
    pos.needsUpdate = true;
    s.life -= 0.015;
    s.line.material.opacity = s.life;
    if (s.life <= 0) { scene.remove(s.line); shootingStars.splice(i,1); }
  }

  // Flicker windows (randomly)
  if (Math.floor(t*10) % 3 === 0) {
    windowMeshes.forEach(w => {
      if (Math.random() > 0.97) w.mesh.material.emissiveIntensity = Math.random() * 3;
      else w.mesh.material.emissiveIntensity += (w.base - w.mesh.material.emissiveIntensity) * 0.1;
    });
  }

  // Animate orbs
  orbs.forEach(o => {
    o.angle += o.speed * 0.01;
    o.mesh.position.x = Math.cos(o.angle) * 12;
    o.mesh.position.z = Math.sin(o.angle) * 12 - 10;
    o.mesh.position.y = 4 + Math.sin(t * 1.5 + o.angle) * 1.5;
    o.mesh.material.emissiveIntensity = 2 + Math.sin(t * 3 + o.angle) * 1;
  });

  // Animate aurora
  auroraPlanes.forEach((a, i) => {
    a.material.opacity = 0.04 + 0.04 * Math.sin(t * 0.5 + i * 1.5);
    a.position.x = Math.sin(t * 0.2 + i) * 20;
  });

  // Animate exhaust
  const ep = exhaustGeo.attributes.position;
  for (let i = 0; i < exhaustCount; i++) {
    ep.array[i*3]   = car.position.x + (Math.random()-0.5)*0.4 - Math.sin(car.rotation.y)*1.8;
    ep.array[i*3+1] = car.position.y + 0.3 + Math.random()*0.3;
    ep.array[i*3+2] = car.position.z + (Math.random()-0.5)*0.4 - Math.cos(car.rotation.y)*1.8;
  }
  ep.needsUpdate = true;
  exhaustMat.opacity = Math.abs(speed) > 0.05 ? 0.6 : 0.1;

  // Pulse road edge strips
  scene.traverse(obj => {
    if (obj.isMesh && obj.material.emissive && obj.material.emissive.getHex() === 0x00f5ff && obj.geometry.type === 'PlaneGeometry') {
      obj.material.emissiveIntensity = 1.5 + Math.sin(t * 3) * 0.5;
    }
  });

  // Animate rain
  const rp = rainGeo.attributes.position;
  for (let i = 0; i < rainCount; i++) {
    rp.array[i*3+1] -= 0.3;
    if (rp.array[i*3+1] < 0) rp.array[i*3+1] = 30;
  }
  rp.needsUpdate = true;

  // Animate floating particles
  floatParticles.rotation.y = t * 0.03;
  const fp = floatGeo.attributes.position;
  for (let i = 1; i < fp.count * 3; i += 3) {
    fp.array[i] += Math.sin(t + i) * 0.002;
  }
  fp.needsUpdate = true;

  // Speed lines
  const kmh2 = Math.abs(speed) / MAX_SPEED;
  document.getElementById('speedlines').style.opacity = kmh2 > 0.5 ? (kmh2 - 0.5) * 2 : 0;

  // Mini-map
  const mmc = document.getElementById('mmCanvas');
  const mmCtx = mmc.getContext('2d');
  mmCtx.fillStyle = 'rgba(0,0,0,0.8)';
  mmCtx.fillRect(0,0,100,100);
  // grid lines
  mmCtx.strokeStyle = 'rgba(0,245,255,0.15)';
  mmCtx.lineWidth = 0.5;
  for(let i=0;i<100;i+=10){mmCtx.beginPath();mmCtx.moveTo(i,0);mmCtx.lineTo(i,100);mmCtx.stroke();mmCtx.beginPath();mmCtx.moveTo(0,i);mmCtx.lineTo(100,i);mmCtx.stroke();}
  // buildings dots
  bdata.forEach(d => {
    const mx = 50 + d[0]*1.2, mz = 50 + d[2]*1.2;
    mmCtx.fillStyle = '#' + d[5].toString(16).padStart(6,'0');
    mmCtx.fillRect(mx-2, mz-2, 4, 6);
  });
  // car dot
  const cx2 = 50 + car.position.x*1.2, cz2 = 50 + car.position.z*1.2;
  mmCtx.fillStyle = '#00f5ff';
  mmCtx.beginPath(); mmCtx.arc(cx2, cz2, 3, 0, Math.PI*2); mmCtx.fill();
  // border
  mmCtx.strokeStyle = 'rgba(0,245,255,0.5)'; mmCtx.lineWidth=1;
  mmCtx.strokeRect(0,0,100,100);

  // HUD speed
  const kmh = Math.abs(Math.round(speed * 200));
  document.getElementById('speednum').textContent = kmh + ' KM/H';
  document.getElementById('speedfill').style.width = (kmh / 56 * 100) + '%';

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
