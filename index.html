<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>עולם תלת-ממדי</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
    canvas { display: block; }
    #ui { position: fixed; top: 30px; left: 0; right: 0; text-align: center; z-index: 10; pointer-events: none; }
    #ui h1 {
      font-size: clamp(24px, 4vw, 60px); font-weight: 900; letter-spacing: 6px;
      background: linear-gradient(90deg, #00f5ff, #ff00ff, #ffff00);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0,245,255,0.8);
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { filter: brightness(1); } 50% { filter: brightness(1.5); }
    }
    #ui p { color: rgba(0,245,255,0.5); letter-spacing: 5px; margin-top: 8px; font-size: 13px; }
    #ctrl { position: fixed; bottom: 25px; left: 0; right: 0; text-align: center;
      color: rgba(255,255,255,0.35); font-size: 12px; letter-spacing: 3px; z-index: 10; pointer-events: none; }
    #speed { position: fixed; bottom: 55px; right: 30px; z-index: 10; pointer-events: none;
      color: #00f5ff; font: bold 14px monospace; letter-spacing: 2px; }
    #vignette { position: fixed; inset: 0; z-index: 5; pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.7) 100%); }
  </style>
</head>
<body>
<div id="ui"><h1>עולם תלת-ממדי</h1><p>✦ INTERACTIVE 3D WORLD ✦</p></div>
<div id="vignette"></div>
<div id="ctrl">W A S D — נהיגה &nbsp;|&nbsp; גרור עכבר — סיבוב מצלמה</div>
<div id="speed">0 KM/H</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js" } }
</script>
<script type="module">
import * as THREE from 'three';

// ---- RENDERER ----
const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 1.5));
renderer.setSize(innerWidth, innerHeight);
renderer.setClearColor(0x05000f);
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x05000f, 0.018);
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 8, 16);

// ---- ALL MESHBASIC — ZERO LIGHTS NEEDED ----

// Ground
scene.add(Object.assign(new THREE.Mesh(
  new THREE.PlaneGeometry(100, 100),
  new THREE.MeshBasicMaterial({ color: 0x0d0d1a })
), { rotation: new THREE.Euler(-Math.PI/2, 0, 0) }));

// Grid
const grid = new THREE.GridHelper(100, 40, 0x003344, 0x110022);
grid.material.opacity = 0.5; grid.material.transparent = true;
scene.add(grid);

// Road
scene.add(Object.assign(new THREE.Mesh(
  new THREE.PlaneGeometry(6, 100),
  new THREE.MeshBasicMaterial({ color: 0x111122 })
), { rotation: new THREE.Euler(-Math.PI/2, 0, 0), position: new THREE.Vector3(0, 0.01, 0) }));

// Road marks — 1 InstancedMesh
{
  const g = new THREE.PlaneGeometry(0.25, 3);
  const m = new THREE.MeshBasicMaterial({ color: 0xffdd00 });
  const count = 15;
  const inst = new THREE.InstancedMesh(g, m, count);
  const d = new THREE.Object3D();
  for (let i = 0; i < count; i++) {
    d.position.set(0, 0.02, -42 + i * 6);
    d.rotation.set(-Math.PI/2, 0, 0);
    d.updateMatrix();
    inst.setMatrixAt(i, d.matrix);
  }
  scene.add(inst);
}

// Road edge strips
[-3.2, 3.2].forEach(x => {
  scene.add(Object.assign(new THREE.Mesh(
    new THREE.PlaneGeometry(0.12, 100),
    new THREE.MeshBasicMaterial({ color: 0x00f5ff })
  ), { rotation: new THREE.Euler(-Math.PI/2, 0, 0), position: new THREE.Vector3(x, 0.015, 0) }));
});

// Stars — single Points object
{
  const pos = new Float32Array(600 * 3);
  for (let i = 0; i < 600; i++) {
    pos[i*3] = (Math.random()-0.5)*300;
    pos[i*3+1] = Math.random()*80+10;
    pos[i*3+2] = (Math.random()-0.5)*300;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  scene.add(new THREE.Points(geo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.2 })));
}

// Sky dome
scene.add(new THREE.Mesh(
  new THREE.SphereGeometry(150, 12, 6),
  new THREE.MeshBasicMaterial({ color: 0x05001a, side: THREE.BackSide })
));

// Buildings — ALL in ONE InstancedMesh per color
const bdata = [
  [-8,-6,3,9,3,0xff00ff],[8,-6,3,11,3,0x00f5ff],
  [-12,-12,2.5,13,2.5,0x00f5ff],[12,-12,2.5,8,2.5,0xff6600],
  [-8,-18,3,7,3,0xffff00],[8,-18,3,15,3,0x00ff88],
  [-12,-24,2,10,2,0xff00ff],[12,-24,2,12,2,0xffff00],
  [-8,6,3,8,3,0x00ff88],[8,6,3,10,3,0xff00ff],
  [-12,12,2.5,12,2.5,0xffff00],[12,12,2.5,7,2.5,0x00f5ff],
];

// Group buildings by color for instancing
const buildingsByColor = {};
bdata.forEach(([x,z,w,h,d,color]) => {
  if (!buildingsByColor[color]) buildingsByColor[color] = [];
  buildingsByColor[color].push({x,z,w,h,d});
});

// Each color = 1 draw call (box geometry is reused)
const dummy = new THREE.Object3D();
Object.entries(buildingsByColor).forEach(([color, buildings]) => {
  const geo = new THREE.BoxGeometry(1, 1, 1);
  const mat = new THREE.MeshBasicMaterial({ color: parseInt(color) });
  const inst = new THREE.InstancedMesh(geo, mat, buildings.length);
  buildings.forEach((b, i) => {
    dummy.position.set(b.x, b.h/2, b.z);
    dummy.scale.set(b.w, b.h, b.d);
    dummy.updateMatrix();
    inst.setMatrixAt(i, dummy.matrix);
  });
  scene.add(inst);
});

// Windows — ALL in 1 InstancedMesh
{
  const winPositions = [];
  bdata.forEach(([x,z,w,h,d]) => {
    for (let iy=0;iy<Math.floor(h/2);iy++) {
      for (let ix=-1;ix<=1;ix++) {
        if (Math.random()>0.4) winPositions.push(x+ix*0.8, iy*1.4+1.5, z+d/2+0.01);
      }
    }
  });
  const winGeo = new THREE.PlaneGeometry(0.5, 0.5);
  const winMat = new THREE.MeshBasicMaterial({ color: 0xffff88 });
  const winInst = new THREE.InstancedMesh(winGeo, winMat, winPositions.length/3);
  for (let i = 0; i < winPositions.length/3; i++) {
    dummy.position.set(winPositions[i*3], winPositions[i*3+1], winPositions[i*3+2]);
    dummy.scale.set(1,1,1); dummy.rotation.set(0,0,0);
    dummy.updateMatrix();
    winInst.setMatrixAt(i, dummy.matrix);
  }
  scene.add(winInst);
}

// Lamps — 1 InstancedMesh for bulbs only (poles skip for perf)
{
  const lampPos = [];
  for (let z=-40;z<40;z+=10) { lampPos.push([-4.5,z]); lampPos.push([4.5,z]); }
  const bulbGeo = new THREE.SphereGeometry(0.25, 6, 6);
  const bulbMat = new THREE.MeshBasicMaterial({ color: 0xffffaa });
  const bulbInst = new THREE.InstancedMesh(bulbGeo, bulbMat, lampPos.length);
  lampPos.forEach(([x,z], i) => {
    dummy.position.set(x+Math.sign(x)*1.5, 5, z);
    dummy.scale.set(1,1,1); dummy.updateMatrix();
    bulbInst.setMatrixAt(i, dummy.matrix);
  });
  scene.add(bulbInst);
}

// Arches — 1 InstancedMesh for bars
{
  const archColors = [0x00f5ff, 0xff00ff, 0xffff00, 0x00ff88, 0xff6600];
  const archZs = [-12, -22, -32, -42, -52];
  archColors.forEach((c, idx) => {
    const mat = new THREE.MeshBasicMaterial({ color: c });
    const barGeo = new THREE.CylinderGeometry(0.08, 0.08, 7.2, 6);
    const postGeo = new THREE.CylinderGeometry(0.08, 0.08, 5, 6);
    // top bar
    const bar = new THREE.Mesh(barGeo, mat);
    bar.rotation.z = Math.PI/2; bar.position.set(0, 5.1, archZs[idx]);
    scene.add(bar);
    // 2 posts
    [-3.5, 3.5].forEach(x => {
      const post = new THREE.Mesh(postGeo, mat);
      post.position.set(x, 2.5, archZs[idx]);
      scene.add(post);
    });
  });
}

// Holographic rings — 4 rings
const rings = [];
[{z:-5,c:0x00f5ff},{z:-25,c:0xff00ff},{z:-45,c:0xffff00},{z:-65,c:0x00ff88}].forEach(({z,c},i) => {
  const ring = new THREE.Mesh(
    new THREE.TorusGeometry(4.5, 0.09, 6, 32),
    new THREE.MeshBasicMaterial({ color: c })
  );
  ring.position.set(0, 5, z); ring.rotation.x = Math.PI/2;
  scene.add(ring);
  rings.push({ mesh: ring, baseY: 5, phase: i*Math.PI/2 });
});

// Text sign (1 canvas texture)
{
  const cv = document.createElement('canvas'); cv.width = 512; cv.height = 128;
  const ctx = cv.getContext('2d');
  ctx.font = 'bold 56px Arial'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.shadowBlur = 30; ctx.shadowColor = '#00f5ff';
  ctx.fillStyle = '#ffffff'; ctx.fillText('✦ CYBER CITY 2084 ✦', 256, 64);
  const sign = new THREE.Mesh(
    new THREE.PlaneGeometry(20, 5),
    new THREE.MeshBasicMaterial({ map: new THREE.CanvasTexture(cv), transparent: true, side: THREE.DoubleSide })
  );
  sign.position.set(0, 22, -38);
  scene.add(sign);
}

// Moon
scene.add(Object.assign(new THREE.Mesh(
  new THREE.SphereGeometry(4, 10, 10),
  new THREE.MeshBasicMaterial({ color: 0xddeeff })
), { position: new THREE.Vector3(-40, 50, -80) }));

// Mountains — simple triangles
for (let i=0;i<8;i++) {
  const w = 20+Math.random()*10, h = 20+Math.random()*20;
  const shape = new THREE.Shape();
  shape.moveTo(-w/2, 0); shape.lineTo(0, h); shape.lineTo(w/2, 0); shape.closePath();
  const m = new THREE.Mesh(new THREE.ShapeGeometry(shape),
    new THREE.MeshBasicMaterial({ color: 0x07001a, side: THREE.DoubleSide }));
  m.position.set((i-4)*25, 0, -90);
  scene.add(m);
}

// Rain — just 80 particles
{
  const pos = new Float32Array(80*3);
  for (let i=0;i<80;i++) { pos[i*3]=(Math.random()-0.5)*60; pos[i*3+1]=Math.random()*25; pos[i*3+2]=(Math.random()-0.5)*60; }
  var rainGeo = new THREE.BufferGeometry();
  rainGeo.setAttribute('position', new THREE.Float32BufferAttribute(pos, 3));
  scene.add(new THREE.Points(rainGeo, new THREE.PointsMaterial({ color: 0x6699cc, size: 0.06 })));
}

// Energy orbs — 6 simple spheres
const orbs = [];
[0x00f5ff, 0xff00ff, 0xffff00, 0x00ff88, 0xff6600, 0x8800ff].forEach((c, i) => {
  const orb = new THREE.Mesh(new THREE.SphereGeometry(0.4, 6, 6), new THREE.MeshBasicMaterial({ color: c }));
  const angle = (i/6)*Math.PI*2;
  orb.position.set(Math.cos(angle)*12, 4, Math.sin(angle)*12-10);
  scene.add(orb);
  orbs.push({ mesh: orb, angle, speed: 0.3+Math.random()*0.3 });
});

// ---- CAR ----
const car = new THREE.Group();
scene.add(car);

car.add(Object.assign(new THREE.Mesh(
  new THREE.BoxGeometry(1.8, 0.6, 3.6),
  new THREE.MeshBasicMaterial({ color: 0x00ccff })
), { position: new THREE.Vector3(0, 0.5, 0) }));

car.add(Object.assign(new THREE.Mesh(
  new THREE.BoxGeometry(1.4, 0.5, 2),
  new THREE.MeshBasicMaterial({ color: 0x003344 })
), { position: new THREE.Vector3(0, 1.05, -0.15) }));

// Underglow
car.add(Object.assign(new THREE.Mesh(
  new THREE.PlaneGeometry(1.8, 3.6),
  new THREE.MeshBasicMaterial({ color: 0x00aaff, transparent: true, opacity: 0.3 })
), { rotation: new THREE.Euler(-Math.PI/2, 0, 0), position: new THREE.Vector3(0, 0.05, 0) }));

// Headlights
[-0.5, 0.5].forEach(x => {
  car.add(Object.assign(new THREE.Mesh(
    new THREE.BoxGeometry(0.3, 0.15, 0.05),
    new THREE.MeshBasicMaterial({ color: 0xffffcc })
  ), { position: new THREE.Vector3(x, 0.5, 1.81) }));
});

// Taillights
[-0.6, 0.6].forEach(x => {
  car.add(Object.assign(new THREE.Mesh(
    new THREE.BoxGeometry(0.25, 0.12, 0.04),
    new THREE.MeshBasicMaterial({ color: 0xff2200 })
  ), { position: new THREE.Vector3(x, 0.5, -1.82) }));
});

// Wheels — 1 InstancedMesh
{
  const wGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.3, 8);
  const wMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
  const wInst = new THREE.InstancedMesh(wGeo, wMat, 4);
  [[-1.05,.35,1.2],[1.05,.35,1.2],[-1.05,.35,-1.2],[1.05,.35,-1.2]].forEach((p, i) => {
    dummy.position.set(...p); dummy.rotation.set(0,0,Math.PI/2); dummy.scale.set(1,1,1);
    dummy.updateMatrix();
    wInst.setMatrixAt(i, dummy.matrix);
  });
  car.add(wInst);
}

// Traffic — 5 simple boxes
const traffic = [];
[0xff3300, 0xffaa00, 0x00ff88, 0xff00aa, 0xcccccc].forEach((c, i) => {
  const m = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.5, 2.8), new THREE.MeshBasicMaterial({ color: c }));
  m.position.set((i%2===0)?1.3:-1.3, 0.45, -50-i*20);
  scene.add(m);
  traffic.push({ mesh: m, speed: 0.15+Math.random()*0.1 });
});

// ---- INPUT ----
const keys = {};
window.addEventListener('keydown', e => { keys[e.code] = true; e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.code] = false; });

let camTheta = 0, camPhi = 0.55, mx0 = 0, my0 = 0, dragging = false;
window.addEventListener('mousedown', e => { dragging = true; mx0 = e.clientX; my0 = e.clientY; });
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', e => {
  if (!dragging) return;
  camTheta += (e.clientX-mx0)*0.006;
  camPhi = Math.max(0.15, Math.min(1.3, camPhi-(e.clientY-my0)*0.006));
  mx0 = e.clientX; my0 = e.clientY;
});
window.addEventListener('touchstart', e => { dragging=true; mx0=e.touches[0].clientX; my0=e.touches[0].clientY; }, {passive:true});
window.addEventListener('touchend', () => dragging=false);
window.addEventListener('touchmove', e => {
  if (!dragging) return;
  camTheta += (e.touches[0].clientX-mx0)*0.006;
  camPhi = Math.max(0.15, Math.min(1.3, camPhi-(e.touches[0].clientY-my0)*0.006));
  mx0=e.touches[0].clientX; my0=e.touches[0].clientY;
}, {passive:true});

// Audio
let audioStarted = false;
function startAudio() {
  if (audioStarted) return; audioStarted = true;
  const ac = new AudioContext();
  function note(freq, start, dur, vol=0.04) {
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = 'sawtooth'; o.frequency.value = freq;
    g.gain.setValueAtTime(0, ac.currentTime+start);
    g.gain.linearRampToValueAtTime(vol, ac.currentTime+start+0.01);
    g.gain.linearRampToValueAtTime(0, ac.currentTime+start+dur);
    o.connect(g); g.connect(ac.destination);
    o.start(ac.currentTime+start); o.stop(ac.currentTime+start+dur+0.1);
  }
  (function beat() {
    [110,0,138.6,0,110,0,164.8,146.8].forEach((f,i) => { if(f) note(f,i*0.25,0.22); });
    note(55,0,2,0.05); note(55,2,2,0.05);
    setTimeout(beat, 2000);
  })();
}
document.addEventListener('keydown', startAudio, {once:true});
document.addEventListener('click', startAudio, {once:true});

// ---- STATE ----
let speed = 0, dir = 0, fc = 0;
const MAX_SPEED = 0.28, ACCEL = 0.013, BRAKE = 0.022, TURN = 0.038;
const _camPos = new THREE.Vector3();
const _camTarget = new THREE.Vector3();
const clock = new THREE.Clock();
const speedEl = document.getElementById('speed');

// ---- ULTRA-LEAN ANIMATE LOOP ----
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  fc++;

  // Car
  if (keys['ArrowUp']||keys['KeyW']) speed = Math.min(MAX_SPEED, speed+ACCEL);
  else if (keys['ArrowDown']||keys['KeyS']) speed = Math.max(-MAX_SPEED*0.5, speed-ACCEL);
  else speed *= (1-BRAKE);
  if (Math.abs(speed)>0.002) {
    if (keys['ArrowLeft']||keys['KeyA']) dir += TURN*Math.sign(speed);
    if (keys['ArrowRight']||keys['KeyD']) dir -= TURN*Math.sign(speed);
  }
  car.rotation.y = dir;
  car.position.x += Math.sin(dir)*speed;
  car.position.z += Math.cos(dir)*speed;

  // Camera
  _camPos.set(car.position.x-Math.sin(dir+camTheta)*15, 7+camPhi*4, car.position.z-Math.cos(dir+camTheta)*15);
  camera.position.lerp(_camPos, 0.07);
  _camTarget.set(car.position.x, 1.5, car.position.z);
  camera.lookAt(_camTarget);

  // Traffic
  traffic.forEach(tc => { tc.mesh.position.z += tc.speed; if (tc.mesh.position.z>30) tc.mesh.position.z=-100; });

  // Every 4th frame: rings + orbs
  if (fc%4===0) {
    rings.forEach((r,i) => { r.mesh.rotation.z += 0.03*(i%2===0?1:-1); r.mesh.position.y = r.baseY+Math.sin(t*0.7+r.phase)*0.8; });
    orbs.forEach(o => { o.angle+=o.speed*0.04; o.mesh.position.set(Math.cos(o.angle)*12, 4+Math.sin(t+o.angle)*1.5, Math.sin(o.angle)*12-10); });
  }

  // Every 6th frame: rain + HUD
  if (fc%6===0) {
    const rp = rainGeo.attributes.position;
    for (let i=0;i<80;i++) { rp.array[i*3+1]-=1.8; if(rp.array[i*3+1]<0) rp.array[i*3+1]=25; }
    rp.needsUpdate = true;
    speedEl.textContent = Math.abs(Math.round(speed*200))+' KM/H';
  }

  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Debug: log draw calls
console.log('Scene objects:', scene.children.length);
</script>
</body>
</html>
